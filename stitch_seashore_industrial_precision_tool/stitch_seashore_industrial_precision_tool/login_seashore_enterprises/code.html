<div class="relative z-10 flex flex-col gap-unit">
<div>
<h1 class="font-h1 text-[64px] leading-none text-on-primary mb-1">SEASHORE</h1>
<p class="font-label-caps text-[12px] text-on-primary tracking-[0.25em]">ENTERPRISES</p>
</div>
<p class="font-body-lg text-body-lg text-inverse-primary italic mt-stack-md max-w-sm">Site Management Platform</p>
</div>
<!-- Technical Footer Element -->
<div class="relative z-10 w-full max-w-md border-t border-inverse-primary/20 pt-stack-sm flex justify-between items-center">
<span class="font-data-mono text-data-mono text-inverse-primary/70 uppercase">Auth_Req // Secure Node 04</span>
<span class="material-symbols-outlined text-inverse-primary/70" style="font-variation-settings: 'FILL' 0;">engineering</span>
</div>
</div>
<!-- RIGHT SPLIT: Authentication Form -->
<div class="flex-1 flex flex-col justify-center items-center p-8 md:p-16 bg-inverse-on-surface relative">
<!-- Main Login Card (Zero shadow, flat brutalism) -->
<div class="w-full max-w-md bg-surface-container-lowest p-margin border border-outline-variant">
<div class="mb-stack-lg">
<h2 class="font-h1 text-[32px] text-primary-container mb-stack-sm">Welcome back</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant">Authenticate to access the engineering platform.</p>
</div>
<form class="space-y-stack-md" onsubmit="event.preventDefault();">
<!-- Email Field -->
<div class="flex flex-col gap-unit">
<label class="font-label-caps text-label-caps text-primary-container uppercase" for="email">Corporate Email</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant focus:border-primary-container focus:ring-0 p-3 font-body-sm text-body-sm text-on-surface transition-colors rounded-none" id="email" placeholder="engineer@seashore.in" required="" type="email"/>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-unit">
<label class="font-label-caps text-label-caps text-primary-container uppercase" for="password">Passkey</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant focus:border-primary-container focus:ring-0 p-3 font-body-sm text-body-sm text-on-surface transition-colors rounded-none" id="password" placeholder="••••••••" required="" type="password"/>
</div>
<!-- Form Controls -->
<div class="flex items-center justify-between mt-stack-sm mb-stack-lg">
<div class="flex items-center gap-2">
<input class="border-outline-variant text-primary-container focus:ring-primary-container rounded-sm w-4 h-4 bg-surface-container-lowest cursor-pointer" id="remember" type="checkbox"/>
<label class="font-body-sm text-body-sm text-on-surface-variant cursor-pointer" for="remember">Remember me</label>
</div>
<a class="font-body-sm text-body-sm text-primary-container hover:underline hover:text-primary" href="#">Forgot access key?</a>
</div>
<!-- Primary Action Button -->
<button class="w-full bg-primary-container hover:bg-on-primary-fixed-variant text-on-primary font-label-caps text-label-caps py-4 rounded transition-colors flex justify-center items-center gap-2 border border-transparent" type="submit">
<span>SIGN IN</span>
<span class="material-symbols-outlined text-[16px]">login</span>
</button>
</form>

<div class="mt-stack-lg border-t border-outline-variant pt-stack-md text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                    Need infrastructure access? <a class="text-primary-container font-semibold hover:underline" href="#">Contact Site Admin</a>
</p>
