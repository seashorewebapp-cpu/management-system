<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Seashore Enterprises - Mobile Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&amp;family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&amp;family=IBM+Plex+Sans:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed-variant": "#723611",
                        "surface-container-high": "#eae7ee",
                        "on-surface": "#1b1b20",
                        "tertiary": "#361200",

                        "inverse-surface": "#303035",

                        "surface-dim": "#dbd9e0",
                        "primary": "#04115c",
                        "on-primary-fixed": "#030f5b",
                        "secondary-fixed-dim": "#bcc3ff",
                        "on-tertiary": "#ffffff",
                        "surface-tint": "#4e59a1",
                        "on-tertiary-container": "#d6865b",
                        "surface": "#fbf8ff",
                        "primary-container": "#1f2a71",
                        "secondary-container": "#b8c0ff",
                        "on-surface-variant": "#454651",
                        "on-secondary": "#ffffff",
                        "outline": "#767682",
                        "on-secondary-fixed": "#0c154c",
                        "surface-container-highest": "#e4e1e8",
                        "surface-container-low": "#f5f2f9",
                        "on-background": "#1b1b20",
                        "on-primary": "#ffffff",
                        "secondary-fixed": "#dfe0ff",
                        "tertiary-container": "#572200",
                        "background": "#fbf8ff",
                        "on-error": "#ffffff",
                        "on-primary-container": "#8a94e1",
                        "on-tertiary-fixed": "#341100",
                        "inverse-primary": "#bbc3ff",
                        "surface-container-lowest": "#ffffff",
                        "error": "#ba1a1a",
                        "tertiary-fixed-dim": "#ffb690",
                        "surface-container": "#efedf4",
                        "on-primary-fixed-variant": "#364087",
                        "secondary": "#525a93",
                        "primary-fixed": "#dfe0ff",
                        "inverse-on-surface": "#f2eff6",
                        "outline-variant": "#c6c5d2",
                        "error-container": "#ffdad6",
                        "primary-fixed-dim": "#bbc3ff",
                        "surface-variant": "#e4e1e8"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",

                    "spacing": {

                        "gutter": "16px",

                    },
                    "fontFamily": {
                        "h2": ["DM Serif Display"],

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background min-h-screen flex flex-col font-body-sm text-body-sm text-on-background selection:bg-primary-container selection:text-on-primary">
<!-- Transactional Screen - Navigation Suppressed -->
<!-- Main Container - Single Column Mobile Layout -->
<main class="flex-1 flex flex-col w-full h-screen max-w-md mx-auto">
<!-- Branding Panel - Top Half -->
<div class="bg-primary-container flex flex-col justify-center items-center py-stack-lg px-margin flex-shrink-0 min-h-[353px] border-b border-outline-variant relative overflow-hidden">
<!-- Subtle texture/pattern suggestion for the background could go here if needed, keeping it flat for now -->
<div class="z-10 text-center flex flex-col gap-unit">
<h1 class="font-h1 text-[48px] leading-[1] text-on-primary tracking-tight">SEASHORE</h1>
<p class="font-label-caps text-label-caps text-on-primary-container tracking-[0.2em] uppercase">Enterprises</p>
</div>
</div>
<!-- Login Card - Bottom Half -->
<div class="flex-1 bg-surface-container-lowest px-margin py-stack-lg flex flex-col justify-start">
<div class="w-full max-w-sm mx-auto flex flex-col gap-stack-md">
<div class="pb-stack-sm border-b border-outline-variant mb-stack-sm">
<h2 class="font-h2 text-h2 text-primary-container">Welcome back</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-unit">Secure portal access for authorized personnel.</p>
</div>
<form action="#" class="flex flex-col gap-stack-md" method="POST">
<!-- Corporate Email Field -->
<div class="flex flex-col gap-unit">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="email">Corporate Email</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-outline">
<span class="material-symbols-outlined text-[18px]">mail</span>
</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-DEFAULT py-2 pl-10 pr-3 font-body-sm text-body-sm text-on-surface focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-colors" id="email" name="email" placeholder="engineer@seashore.com" required="" type="email"/>
</div>
</div>
<!-- Passkey Field -->
<div class="flex flex-col gap-unit">
<div class="flex justify-between items-center">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="passkey">Passkey</label>
<a class="font-body-sm text-[12px] text-primary hover:underline" href="#">Forgot passkey?</a>
</div>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-outline">
<span class="material-symbols-outlined text-[18px]">key</span>
</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-DEFAULT py-2 pl-10 pr-10 font-data-mono text-data-mono text-on-surface focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-colors" id="passkey" name="passkey" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 flex items-center pr-3 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[18px]">visibility_off</span>
</button>
</div>
</div>
<!-- Additional Options -->
<div class="flex items-center justify-between pt-unit">
<label class="flex items-center gap-2 cursor-pointer">
<input class="form-checkbox h-4 w-4 text-primary-container border-outline-variant rounded-sm focus:ring-primary-container" type="checkbox"/>
<span class="font-body-sm text-[13px] text-on-surface-variant">Remember device</span>
</label>
</div>
<!-- CTA Button -->
<button class="mt-stack-sm w-full bg-primary-container text-on-primary font-body-lg text-body-lg font-semibold py-3 rounded-DEFAULT hover:bg-[#141C52] active:bg-primary transition-colors flex justify-center items-center gap-2 border border-primary-container" type="submit">
<span>Authenticate</span>
<span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
<div class="mt-auto pt-stack-lg text-center">
<p class="font-body-sm text-[12px] text-outline">System Access Level: L2. Encrypted Connection.</p>
</div>
</div>
</div>
</main>
</body></html>
